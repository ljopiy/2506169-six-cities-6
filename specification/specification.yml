openapi: 3.1.0
info:
  title: API сервер для проекта «Шесть городов»
  description: |-
    Спецификация REST API для сервиса аренды жилья.
    Включает управление объявлениями, пользователями и систему отзывов.
  version: 2.3.0

tags:
  - name: offers
    description: Предложения по аренде
  - name: comments
    description: Комментарии к предложениям
  - name: users
    description: Пользователи и аутентификация

paths:
  # ПРЕДЛОЖЕНИЯ
  /offers:
    get:
      tags: [offers]
      summary: Получить список предложений
      description: Для неавторизованного пользователя поле `isFavorite` всегда `false`.
      parameters:
        - name: limit
          in: query
          description: Максимальное количество предложений (по умолчанию 60)
          schema:
            type: integer
            minimum: 1
            default: 60
      responses:
        '200':
          description: Список предложений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/offerPreview'
    post:
      tags: [offers]
      summary: Создать предложение
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/offerCreate'
      responses:
        '201':
          description: Предложение создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/offer'
        '400':
          description: Ошибка валидации
        '401':
          description: Требуется аутентификация

  /offers/{offerId}:
    parameters:
      - $ref: '#/components/parameters/offerId'
    get:
      tags: [offers]
      summary: Получить детальную информацию о предложении
      description: Для неавторизованного пользователя поле `isFavorite` всегда `false`.
      responses:
        '200':
          description: Детальная информация по предложению
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/offer'
        '400':
          description: Некорректный offerId
        '404':
          description: Предложение не найдено
    patch:
      tags: [offers]
      summary: Обновить предложение
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/offerUpdate'
      responses:
        '200':
          description: Предложение обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/offer'
        '400':
          description: Ошибка валидации
        '401':
          description: Требуется аутентификация
        '403':
          description: Недостаточно прав (обновлять может только автор)
        '404':
          description: Предложение не найдено
    delete:
      tags: [offers]
      summary: Удалить предложение
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Предложение удалено
        '400':
          description: Некорректный offerId
        '401':
          description: Требуется аутентификация
        '403':
          description: Недостаточно прав (удалять может только автор)
        '404':
          description: Предложение не найдено

  /offers/premium/{city}:
    get:
      tags: [offers]
      summary: Получить премиальные предложения по городу
      description: Возвращает до 3 премиальных предложений.
      parameters:
        - $ref: '#/components/parameters/city'
      responses:
        '200':
          description: Список премиальных предложений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/offerPreview'
        '400':
          description: Некорректный город

  /offers/favorite:
    get:
      tags: [offers]
      summary: Получить избранные предложения текущего пользователя
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список избранных предложений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/offerPreview'
        '401':
          description: Требуется аутентификация

  /offers/favorite/{offerId}:
    parameters:
      - $ref: '#/components/parameters/offerId'
    post:
      tags: [offers]
      summary: Добавить предложение в избранное
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Обновлённое предложение
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/offer'
        '400':
          description: Некорректный offerId
        '401':
          description: Требуется аутентификация
        '404':
          description: Предложение не найдено
    delete:
      tags: [offers]
      summary: Удалить предложение из избранного
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Обновлённое предложение
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/offer'
        '400':
          description: Некорректный offerId
        '401':
          description: Требуется аутентификация
        '404':
          description: Предложение не найдено

  # КОММЕНТАРИИ
  /offers/{offerId}/comments:
    parameters:
      - $ref: '#/components/parameters/offerId'
    get:
      tags: [comments]
      summary: Получить комментарии предложения
      description: Возвращает не более 50 последних комментариев (сначала новые).
      responses:
        '200':
          description: Список комментариев
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/comment'
        '400':
          description: Некорректный offerId
        '404':
          description: Предложение не найдено
    post:
      tags: [comments]
      summary: Добавить комментарий к предложению
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/commentCreate'
      responses:
        '201':
          description: Комментарий создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/comment'
        '400':
          description: Ошибка валидации
        '401':
          description: Требуется аутентификация
        '404':
          description: Предложение не найдено

  # ПОЛЬЗОВАТЕЛИ
  /users/register:
    post:
      tags: [users]
      summary: Зарегистрировать пользователя
      description: Можно отправить JSON без аватара или `multipart/form-data` с полем `avatar` (.jpg/.png).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/userCreate'
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/userCreate'
                - type: object
                  properties:
                    avatar:
                      type: string
                      format: binary
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userRead'
        '400':
          description: Ошибка валидации
        '403':
          description: Регистрироваться могут только анонимные клиенты
        '409':
          description: Пользователь с таким email уже существует

  /users/login:
    post:
      tags: [users]
      summary: Войти в закрытую часть приложения
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/loginRequest'
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/loggedUser'
        '400':
          description: Ошибка валидации
        '401':
          description: Неверный логин или пароль
    get:
      tags: [users]
      summary: Проверить состояние пользователя
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Пользователь авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userRead'
        '401':
          description: Требуется аутентификация

  /users/avatar:
    post:
      tags: [users]
      summary: Загрузить аватар пользователя
      description: Отдельный метод для смены аватара у уже авторизованного пользователя.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '201':
          description: Аватар обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/uploadUserAvatar'
        '400':
          description: Некорректный файл
        '401':
          description: Требуется аутентификация
        '404':
          description: Пользователь не найден

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    offerId:
      name: offerId
      in: path
      required: true
      schema:
        type: string
      description: Идентификатор предложения
    city:
      name: city
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/cityName'
      description: Название города

  schemas:
    cityName:
      type: string
      enum: [Paris, Cologne, Brussels, Amsterdam, Hamburg, Dusseldorf]

    coordinates:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180

    city:
      type: object
      required: [name, coordinates]
      properties:
        name:
          $ref: '#/components/schemas/cityName'
        coordinates:
          $ref: '#/components/schemas/coordinates'

    userType:
      type: string
      enum: [ordinary, pro]

    uploadUserAvatar:
      type: object
      required: [filepath]
      properties:
        filepath:
          type: string

    userRead:
      type: object
      required: [id, name, email, avatarPath, type]
      properties:
        id:
          type: string
        name:
          type: string
          minLength: 1
          maxLength: 15
        email:
          type: string
          format: email
        avatarPath:
          type: string
        type:
          $ref: '#/components/schemas/userType'

    userCreate:
      type: object
      required: [name, email, password, type]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 15
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
          maxLength: 12
        type:
          $ref: '#/components/schemas/userType'

    loginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
          maxLength: 12

    loggedUser:
      type: object
      required: [email, token]
      properties:
        email:
          type: string
          format: email
        token:
          type: string

    offerType:
      type: string
      enum: [apartment, house, room, hotel]

    convenience:
      type: string
      enum:
        - Breakfast
        - Air conditioning
        - Laptop friendly workspace
        - Baby seat
        - Washer
        - Towels
        - Fridge

    offer:
      type: object
      required:
        - id
        - title
        - description
        - postDate
        - isPremium
        - isFavorite
        - rating
        - type
        - roomsCount
        - guestsCount
        - price
        - conveniences
        - previewUrl
        - images
        - commentsCount
        - author
        - city
        - coordinates
      properties:
        id:
          type: string
        title:
          type: string
          minLength: 10
          maxLength: 100
        description:
          type: string
          minLength: 20
          maxLength: 1024
        postDate:
          type: string
          format: date-time
        isPremium:
          type: boolean
        isFavorite:
          type: boolean
          description: Вычисляется динамически для текущего пользователя по его `favoriteOffers`; для неавторизованного пользователя всегда `false`.
        rating:
          type: number
          minimum: 0
          maximum: 5
          multipleOf: 0.1
        type:
          $ref: '#/components/schemas/offerType'
        roomsCount:
          type: integer
          minimum: 1
          maximum: 8
        guestsCount:
          type: integer
          minimum: 1
          maximum: 10
        price:
          type: integer
          minimum: 100
          maximum: 100000
        conveniences:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/convenience'
        previewUrl:
          type: string
        images:
          type: array
          minItems: 6
          maxItems: 6
          items:
            type: string
        commentsCount:
          type: integer
          minimum: 0
        author:
          $ref: '#/components/schemas/userRead'
        city:
          $ref: '#/components/schemas/city'
        coordinates:
          $ref: '#/components/schemas/coordinates'

    offerPreview:
      type: object
      required:
        - id
        - title
        - postDate
        - isPremium
        - isFavorite
        - rating
        - type
        - price
        - commentsCount
        - previewUrl
        - city
      properties:
        id:
          type: string
        title:
          type: string
          minLength: 10
          maxLength: 100
        postDate:
          type: string
          format: date-time
        isPremium:
          type: boolean
        isFavorite:
          type: boolean
          description: Вычисляется динамически для текущего пользователя по его `favoriteOffers`; для неавторизованного пользователя всегда `false`.
        rating:
          type: number
          minimum: 0
          maximum: 5
          multipleOf: 0.1
        type:
          $ref: '#/components/schemas/offerType'
        price:
          type: integer
          minimum: 100
          maximum: 100000
        commentsCount:
          type: integer
          minimum: 0
        previewUrl:
          type: string
        city:
          $ref: '#/components/schemas/city'

    offerCreate:
      type: object
      required:
        - title
        - description
        - city
        - previewUrl
        - images
        - isPremium
        - type
        - roomsCount
        - guestsCount
        - price
        - conveniences
        - coordinates
      properties:
        title:
          type: string
          minLength: 10
          maxLength: 100
        description:
          type: string
          minLength: 20
          maxLength: 1024
        postDate:
          type: string
          format: date-time
        city:
          $ref: '#/components/schemas/cityName'
        previewUrl:
          type: string
        images:
          type: array
          minItems: 6
          maxItems: 6
          items:
            type: string
        isPremium:
          type: boolean
        type:
          $ref: '#/components/schemas/offerType'
        roomsCount:
          type: integer
          minimum: 1
          maximum: 8
        guestsCount:
          type: integer
          minimum: 1
          maximum: 10
        price:
          type: integer
          minimum: 100
          maximum: 100000
        conveniences:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/convenience'
        coordinates:
          $ref: '#/components/schemas/coordinates'

    offerUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 10
          maxLength: 100
        description:
          type: string
          minLength: 20
          maxLength: 1024
        city:
          $ref: '#/components/schemas/cityName'
        previewUrl:
          type: string
        images:
          type: array
          minItems: 6
          maxItems: 6
          items:
            type: string
        isPremium:
          type: boolean
        type:
          $ref: '#/components/schemas/offerType'
        roomsCount:
          type: integer
          minimum: 1
          maximum: 8
        guestsCount:
          type: integer
          minimum: 1
          maximum: 10
        price:
          type: integer
          minimum: 100
          maximum: 100000
        conveniences:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/convenience'
        coordinates:
          $ref: '#/components/schemas/coordinates'

    comment:
      type: object
      required: [id, text, rating, createdAt, author]
      properties:
        id:
          type: string
        text:
          type: string
          minLength: 5
          maxLength: 1024
        rating:
          type: number
          minimum: 1
          maximum: 5
        createdAt:
          type: string
          format: date-time
        author:
          $ref: '#/components/schemas/userRead'

    commentCreate:
      type: object
      required: [text, rating]
      properties:
        text:
          type: string
          minLength: 5
          maxLength: 1024
        rating:
          type: integer
          minimum: 1
          maximum: 5